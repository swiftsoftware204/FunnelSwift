events { worker_connections 1024; }
http {
  upstream funnelswift { server funnelswift:8080; }
  upstream crmswift { server crmswift:8081; }
  
  server {
    listen 80;
    server_name app.funnelswift.net;
    location / { 
      proxy_pass http://funnelswift;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
  
  server {
    listen 80;
    server_name crm.funnelswift.net;
    location / { 
      proxy_pass http://crmswift;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}